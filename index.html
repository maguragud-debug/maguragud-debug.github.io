<!DOCTYPE html>
<html>
<head>
    <title>Моя песочница</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            text-align: center;
            padding: 50px;
            margin: 0;
        }
        .box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c974b;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background: #2c974b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #22863a;
        }
        #demo {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 80%;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🧪 Моя песочница</h1>
        <p>Привет! Это твой первый сайт на GitHub Pages.</p>
        <p>Попробуй нажать на кнопку:</p>
        <button id="myButton">Нажми меня</button>
        <p id="demo">Текст изменится после нажатия...</p>
        <hr>
        <p><strong>✏️ Попробуй ввести своё имя:</strong></p>
        <input type="text" id="nameInput" placeholder="Введите ваше имя...">
        <button id="greetButton">Поздороваться</button>
        <p id="greeting"></p>
    </div>

    <script>
        // Кнопка "Нажми меня"
        document.getElementById('myButton').addEventListener('click', function() {
            document.getElementById('demo').innerHTML = '🎉 Код сработал! Ты великолепен!';
        });

        // Кнопка "Поздороваться"
        document.getElementById('greetButton').addEventListener('click', function() {
            var name = document.getElementById('nameInput').value;
            if (name) {
                document.getElementById('greeting').innerHTML = '👋 Привет, ' + name + '! Рад тебя видеть!';
            } else {
                document.getElementById('greeting').innerHTML = '😅 Напиши сначала своё имя!';
            }
        });
    </script>
</body>
</html>
